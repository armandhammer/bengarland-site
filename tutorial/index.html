<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Interactive Bar Chart Micro-Tutorial</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    button {
      margin-bottom: 15px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
    }

    .bar {
      fill: steelblue;
    }

    .bar:hover {
      fill: orange;
    }

    .axis-label {
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>Interactive Bar Chart with Sorting</h1>
  <button id="sortButton">Sort Descending</button>

  <div id="chart"></div>

  <!-- Load local D3 library -->
  <script src="d3.v7.min.js"></script>
  <script src="barchart.js"></script>
</body>
</html>
